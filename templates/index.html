<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Intelligence</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="logo">
        📱 Phone Intelligence
    </div>

    <div class="subtitle">
        Search public phone information instantly
    </div>

    <form method="POST">

        <div class="search-box">

            <input
                type="text"
                name="phone"
                placeholder="+79991234567"
                required
            >

            <button type="submit">
                Search
            </button>

        </div>

    </form>

    <div class="loader" id="loader"></div>

    {% if result %}

    <div class="result">

        <div class="result-top">

            <h2>Result</h2>

            <button class="copy-btn" onclick="copyResult()">
                Copy
            </button>

        </div>

        <div class="result-grid">

            <div class="result-card">
                <div class="label">
                    📞 Number
                </div>

                <div class="value">
                    {{ result.number }}
                </div>
            </div>

            <div class="result-card">
                <div class="label">
                    🌍 Country
                </div>

                <div class="value">
                    {{ result.country_name }}
                </div>
            </div>

            <div class="result-card">
                <div class="label">
                    📍 Region
                </div>

                <div class="value">
                    {{ result.location }}
                </div>
            </div>

            <div class="result-card">
                <div class="label">
                    📡 Carrier
                </div>

                <div class="value">
                    {{ result.carrier }}
                </div>
            </div>

            <div class="result-card">
                <div class="label">
                    ☎️ Type
                </div>

                <div class="value">
                    {{ result.line_type }}
                </div>
            </div>

        </div>

    </div>

    {% endif %}

    {% if error %}

    <div class="error">
        {{ error }}
    </div>

    {% endif %}

</div>

<script>

const form = document.querySelector("form");
const loader = document.getElementById("loader");

form.addEventListener("submit", () => {
    loader.style.display = "block";
});

function copyResult(){

    const text = `
Number: {{ result.number if result else '' }}
Country: {{ result.country_name if result else '' }}
Region: {{ result.location if result else '' }}
Carrier: {{ result.carrier if result else '' }}
Type: {{ result.line_type if result else '' }}
    `;

    navigator.clipboard.writeText(text);

}

</script>

</body>
</html>
